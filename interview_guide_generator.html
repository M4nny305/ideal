<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Guide Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface2: #f3f0ea;
    --border: #e0d9ce;
    --accent: #c8480a;
    --accent-light: #fdf0eb;
    --accent2: #1a3a5c;
    --text: #1c1a18;
    --muted: #7a7268;
    --success: #2d6a4f;
    --heading: 'Playfair Display', serif;
    --body: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--accent2);
    color: white;
    padding: 48px 32px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.03) 40px,
      rgba(255,255,255,0.03) 80px
    );
  }
  .hero-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
  }
  .hero h1 {
    font-family: var(--heading);
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 14px;
    position: relative;
  }
  .hero h1 span { color: #f97316; }
  .hero p {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    max-width: 500px;
    margin: 0 auto;
    font-weight: 300;
    line-height: 1.6;
    position: relative;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
    min-height: 100px;
  }

  .bubble {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble.bot { flex-direction: row; }
  .bubble.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .bot .avatar { background: var(--accent2); }
  .user .avatar { background: var(--accent); }

  .bubble-text {
    max-width: 85%;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.65;
  }
  .bot .bubble-text {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .user .bubble-text {
    background: var(--accent2);
    color: white;
    border-top-right-radius: 4px;
  }

  /* ── INPUT AREA ── */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .input-area textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: var(--body);
    font-size: 15px;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }
  .input-area textarea::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    font-size: 18px;
  }
  .send-btn:hover { background: #a83a08; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* ── PROGRESS ── */
  .progress-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    align-items: center;
  }
  .progress-step {
    height: 4px;
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
  }
  .progress-step.done { background: var(--accent); }
  .progress-step.active { background: var(--accent2); }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── GENERATING STATE ── */
  .generating {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .generating.active { display: block; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .generating p {
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
  }
  .generating .gen-steps {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .gen-step {
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 0.5s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── GUIDE OUTPUT ── */
  #guide-output {
    display: none;
  }
  #guide-output.active { display: block; }

  .guide-header {
    background: var(--accent2);
    color: white;
    border-radius: 16px 16px 0 0;
    padding: 32px 32px 28px;
    position: relative;
    overflow: hidden;
  }
  .guide-header::after {
    content: '✦';
    position: absolute;
    right: 24px;
    top: 20px;
    font-size: 48px;
    opacity: 0.08;
  }
  .guide-header .gtag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .guide-header h2 {
    font-family: var(--heading);
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .guide-header .guide-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }

  .guide-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 0 0 8px;
  }

  .guide-section {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .guide-section:last-child { border-bottom: none; }

  .guide-section-header {
    padding: 20px 28px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .guide-section-header:hover { background: var(--surface2); }

  .section-num-badge {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .section-title-text {
    font-family: var(--heading);
    font-size: 18px;
    flex: 1;
    color: var(--text);
  }
  .section-toggle {
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .section-toggle.open { transform: rotate(180deg); }

  .guide-section-body {
    padding: 0 28px 20px;
    display: none;
  }
  .guide-section-body.open { display: block; }

  .qa-block {
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .qa-q {
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    background: white;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .qa-a {
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }
  .tip-box {
    margin-top: 10px;
    padding: 10px 14px;
    background: #edf7f2;
    border-left: 3px solid var(--success);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--success);
    line-height: 1.6;
  }

  /* ── ACTIONS ── */
  .guide-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 22px;
    border-radius: 10px;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a83a08; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); }

  /* ── TYPING INDICATOR ── */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .chat-wrapper { display: block; }
  .chat-wrapper.hidden { display: none; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Free Tool</div>
  <h1>Your Personal<br><span>Interview Guide</span></h1>
  <p>Answer a few questions about your background and we'll generate a custom interview prep guide — just for you.</p>
</div>

<div class="main">

  <!-- Progress -->
  <div class="progress-bar" id="progress-bar">
    <div class="progress-step active" id="ps-1"></div>
    <div class="progress-step" id="ps-2"></div>
    <div class="progress-step" id="ps-3"></div>
    <div class="progress-step" id="ps-4"></div>
    <div class="progress-step" id="ps-5"></div>
    <div class="progress-step" id="ps-6"></div>
    <span class="progress-label" id="progress-label">Step 1 of 6</span>
  </div>

  <!-- Chat -->
  <div class="chat-wrapper" id="chat-wrapper">
    <div class="chat-area" id="chat-area"></div>

    <div class="input-area" id="input-area">
      <textarea id="user-input" placeholder="Type your answer here..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="handleSend()">➤</button>
    </div>
  </div>

  <!-- Generating -->
  <div class="generating" id="generating">
    <div class="spinner"></div>
    <p>Building your personalized guide...</p>
    <div class="gen-steps" id="gen-steps"></div>
  </div>

  <!-- Guide Output -->
  <div id="guide-output">
    <div class="guide-header">
      <div class="gtag">Your Personalized Interview Guide</div>
      <h2 id="guide-title">Interview Prep Guide</h2>
      <div class="guide-sub" id="guide-sub"></div>
    </div>
    <div class="guide-body" id="guide-body"></div>
    <div class="guide-actions">
      <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save as PDF</button>
      <button class="btn btn-secondary" onclick="startOver()">↺ Start Over</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    key: 'name',
    ask: "Hi! 👋 I'm your Interview Guide assistant. Let's build your personalized prep guide.\n\nFirst — what's your first name?",
    placeholder: "Your first name..."
  },
  {
    key: 'role_target',
    ask: (d) => `Great, ${d.name}! What type of role or industry are you interviewing for? Be as specific or general as you like.\n\n(e.g. "IT Support", "Marketing Manager", "Nurse", "Sales", "Accounting" etc.)`,
    placeholder: "e.g. IT Support Engineer, Marketing Manager..."
  },
  {
    key: 'current_situation',
    ask: () => `Got it. Now, why are you leaving your current or most recent job?\n\nBe honest — I'll help you frame it professionally. (e.g. laid off, seeking growth, career change, relocation, company closed, etc.)`,
    placeholder: "e.g. Laid off due to restructuring, looking for growth..."
  },
  {
    key: 'experience',
    ask: () => `Thanks for sharing that. Tell me about your work experience — how many years, what industry, and what kind of work have you done? Include any tools, systems, or skills you're proud of.`,
    placeholder: "e.g. 10 years in customer service, used Salesforce, led a team of 5..."
  },
  {
    key: 'accomplishment',
    ask: () => `Almost there! What's your single biggest career accomplishment — something you're genuinely proud of? It can be a project, a result, a challenge you overcame, or something you built or improved.`,
    placeholder: "e.g. Led a team that reduced customer wait times by 40%..."
  },
  {
    key: 'extra',
    ask: () => `Last one! Is there anything else you'd like your guide to address? For example: gaps in employment, a career change, lack of a degree, switching industries, or anything you're worried an interviewer might ask about.\n\nOr type "none" if you're good!`,
    placeholder: "e.g. I have a 2-year gap, I'm switching from finance to tech... or 'none'"
  }
];

let step = 0;
let data = {};
let isWaiting = false;

function updateProgress() {
  for (let i = 1; i <= 6; i++) {
    const el = document.getElementById(`ps-${i}`);
    if (i < step + 1) { el.className = 'progress-step done'; }
    else if (i === step + 1) { el.className = 'progress-step active'; }
    else { el.className = 'progress-step'; }
  }
  const label = document.getElementById('progress-label');
  if (step >= 6) { label.textContent = 'Generating...'; }
  else { label.textContent = `Step ${Math.min(step + 1, 6)} of 6`; }
}

function addBotBubble(text, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      // Show typing indicator first
      const typingDiv = document.createElement('div');
      typingDiv.className = 'bubble bot';
      typingDiv.innerHTML = `
        <div class="avatar">🎯</div>
        <div class="typing"><span></span><span></span><span></span></div>
      `;
      document.getElementById('chat-area').appendChild(typingDiv);
      scrollBottom();

      setTimeout(() => {
        typingDiv.remove();
        const div = document.createElement('div');
        div.className = 'bubble bot';
        div.innerHTML = `
          <div class="avatar">🎯</div>
          <div class="bubble-text">${text.replace(/\n/g, '<br>')}</div>
        `;
        document.getElementById('chat-area').appendChild(div);
        scrollBottom();
        resolve();
      }, 800);
    }, delay);
  });
}

function addUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'bubble user';
  div.innerHTML = `
    <div class="avatar" style="background:var(--accent)">😊</div>
    <div class="bubble-text">${text}</div>
  `;
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function handleSend() {
  if (isWaiting) return;
  const input = document.getElementById('user-input');
  const val = input.value.trim();
  if (!val) return;

  input.value = '';
  input.style.height = 'auto';
  addUserBubble(val);

  const q = QUESTIONS[step];
  data[q.key] = val;
  step++;
  updateProgress();

  if (step < QUESTIONS.length) {
    isWaiting = true;
    document.getElementById('send-btn').disabled = true;
    const nextQ = QUESTIONS[step];
    const text = typeof nextQ.ask === 'function' ? nextQ.ask(data) : nextQ.ask;
    await addBotBubble(text, 200);
    document.getElementById('user-input').placeholder = nextQ.placeholder;
    isWaiting = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  } else {
    // All questions answered — generate guide
    document.getElementById('send-btn').disabled = true;
    await addBotBubble("Perfect! I have everything I need. Give me a moment to build your personalized guide... 🚀", 200);
    setTimeout(() => {
      document.getElementById('chat-wrapper').classList.add('hidden');
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('progress-bar').style.display = 'none';
      showGenerating();
      generateGuide();
    }, 1200);
  }
}

function showGenerating() {
  const gen = document.getElementById('generating');
  gen.classList.add('active');
  const steps = [
    'Analyzing your background...',
    'Crafting your exit statement...',
    'Writing behavioral answers...',
    'Building your STAR stories...',
    'Adding technical questions...',
    'Finalizing your guide...'
  ];
  const container = document.getElementById('gen-steps');
  steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'gen-step';
    el.textContent = s;
    el.style.animationDelay = `${i * 0.8}s`;
    container.appendChild(el);
  });
}

async function generateGuide() {
  const prompt = `You are an expert career coach and interview preparation specialist. A user has provided the following information about themselves:

Name: ${data.name}
Target Role/Industry: ${data.role_target}
Reason for Leaving Current Job: ${data.current_situation}
Work Experience & Skills: ${data.experience}
Biggest Career Accomplishment: ${data.accomplishment}
Additional Concerns: ${data.extra}

Create a comprehensive, personalized interview prep guide for this person. Return ONLY valid JSON — no markdown, no backticks, no preamble.

The JSON must follow this exact structure:
{
  "title": "Short personalized title like '[Name]'s Interview Prep Guide'",
  "subtitle": "e.g. '[X] years in [industry] → [Target Role]'",
  "sections": [
    {
      "id": "exit",
      "title": "Exit Statement",
      "badge": "Memorize This",
      "items": [
        {
          "question": "Why did you leave your last job?",
          "answer": "Full polished answer...",
          "tip": "Optional delivery tip..."
        }
      ]
    },
    {
      "id": "common",
      "title": "Common Questions",
      "badge": "Know These Cold",
      "items": [
        { "question": "Tell me about yourself.", "answer": "...", "tip": "..." },
        { "question": "What are your greatest strengths?", "answer": "...", "tip": "" },
        { "question": "What is your greatest weakness?", "answer": "...", "tip": "..." },
        { "question": "Where do you see yourself in 5 years?", "answer": "...", "tip": "" },
        { "question": "Why do you want to work here?", "answer": "...", "tip": "..." }
      ]
    },
    {
      "id": "behavioral",
      "title": "Behavioral Questions (STAR Format)",
      "badge": "Real Stories",
      "items": [
        {
          "question": "Tell me about a time you overcame a challenge.",
          "answer": "SITUATION: ...\n\nTASK: ...\n\nACTION: ...\n\nRESULT: ...",
          "tip": ""
        },
        {
          "question": "Tell me about a time you worked with a difficult person.",
          "answer": "SITUATION: ...\n\nTASK: ...\n\nACTION: ...\n\nRESULT: ...",
          "tip": ""
        },
        {
          "question": "Tell me about your greatest accomplishment.",
          "answer": "SITUATION: ...\n\nTASK: ...\n\nACTION: ...\n\nRESULT: ...",
          "tip": ""
        }
      ]
    },
    {
      "id": "situational",
      "title": "Role-Specific Questions",
      "badge": "Industry Focused",
      "items": [
        { "question": "...", "answer": "...", "tip": "" },
        { "question": "...", "answer": "...", "tip": "" },
        { "question": "...", "answer": "...", "tip": "" }
      ]
    },
    {
      "id": "ask",
      "title": "Questions to Ask Them",
      "badge": "Always Ask 2–3",
      "items": [
        { "question": "Strong question to ask the interviewer", "answer": "Why this question works and what it signals about you.", "tip": "" },
        { "question": "Strong question to ask the interviewer", "answer": "Why this question works.", "tip": "" },
        { "question": "Strong question to ask the interviewer", "answer": "Why this question works.", "tip": "" },
        { "question": "Strong question to ask the interviewer", "answer": "Why this question works.", "tip": "" },
        { "question": "Strong question to ask the interviewer", "answer": "Why this question works.", "tip": "" }
      ]
    },
    {
      "id": "strengths",
      "title": "Your Key Selling Points",
      "badge": "Own These",
      "items": [
        { "question": "Selling point #1", "answer": "Why this matters to employers and how to mention it naturally.", "tip": "" },
        { "question": "Selling point #2", "answer": "...", "tip": "" },
        { "question": "Selling point #3", "answer": "...", "tip": "" },
        { "question": "Selling point #4", "answer": "...", "tip": "" },
        { "question": "Selling point #5", "answer": "...", "tip": "" }
      ]
    }
  ]
}

IMPORTANT RULES:
- Keep each "answer" field to 3-5 sentences maximum. Be concise but specific.
- For STAR format answers, keep each section (SITUATION/TASK/ACTION/RESULT) to 1-2 sentences.
- Keep "tip" fields to 1 sentence or leave as empty string "".
- Make answers specific to this person's real background — no generic advice.
- Every answer must be interview-ready and natural to speak aloud.
- Return ONLY the JSON object. No extra text, no markdown, no backticks.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const raw = await response.json();
    let text = raw.content.map(c => c.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const guide = JSON.parse(text);
    renderGuide(guide);
  } catch (err) {
    console.error(err);
    document.getElementById('generating').innerHTML = `
      <p style="color:var(--accent)">Something went wrong generating your guide. Please try refreshing and starting over.</p>
    `;
  }
}

function renderGuide(guide) {
  document.getElementById('generating').classList.remove('active');

  document.getElementById('guide-title').textContent = guide.title || `${data.name}'s Interview Guide`;
  document.getElementById('guide-sub').textContent = guide.subtitle || '';

  const body = document.getElementById('guide-body');
  body.innerHTML = '';

  const badgeColors = {
    'Memorize This': 'background:#fdf0eb;color:#c8480a',
    'Know These Cold': 'background:#e8f0fb;color:#1a3a5c',
    'Real Stories': 'background:#edf7f2;color:#2d6a4f',
    'Industry Focused': 'background:#fdf0eb;color:#c8480a',
    'Always Ask 2–3': 'background:#e8f0fb;color:#1a3a5c',
    'Own These': 'background:#edf7f2;color:#2d6a4f'
  };

  guide.sections.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'guide-section';

    const badgeStyle = badgeColors[section.badge] || 'background:#f0f0f0;color:#555';

    sec.innerHTML = `
      <div class="guide-section-header" onclick="toggleSection(${si})">
        <span class="section-num-badge">0${si + 1}</span>
        <span class="section-title-text">${section.title}</span>
        <span style="font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:20px;${badgeStyle}">${section.badge}</span>
        <span class="section-toggle" id="toggle-${si}">▾</span>
      </div>
      <div class="guide-section-body ${si === 0 ? 'open' : ''}" id="section-body-${si}">
        ${section.items.map(item => `
          <div class="qa-block">
            <div class="qa-q">❝ ${item.question}</div>
            <div class="qa-a">${item.answer.replace(/\n/g, '<br>')}${item.tip ? `<div class="tip-box">💡 ${item.tip}</div>` : ''}</div>
          </div>
        `).join('')}
      </div>
    `;
    body.appendChild(sec);
  });

  // First section toggle open
  const firstToggle = document.getElementById('toggle-0');
  if (firstToggle) firstToggle.classList.add('open');

  document.getElementById('guide-output').classList.add('active');
  scrollBottom();
}

function toggleSection(i) {
  const body = document.getElementById(`section-body-${i}`);
  const toggle = document.getElementById(`toggle-${i}`);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function startOver() {
  step = 0;
  data = {};
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('guide-output').classList.remove('active');
  document.getElementById('guide-body').innerHTML = '';
  document.getElementById('gen-steps').innerHTML = '';
  document.getElementById('generating').classList.remove('active');
  document.getElementById('chat-wrapper').classList.remove('hidden');
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('progress-bar').style.display = 'flex';
  document.getElementById('send-btn').disabled = false;
  updateProgress();
  init();
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
});

// Enter to send
document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

async function init() {
  updateProgress();
  const firstQ = QUESTIONS[0];
  await addBotBubble(firstQ.ask, 400);
  document.getElementById('user-input').placeholder = firstQ.placeholder;
  document.getElementById('user-input').focus();
}

init();
</script>
</body>
</html>
